name: Build
on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust_toolchain: [nightly, nightly-2024-09-01]
        device: [msp430fr2355, msp430fr2476, msp430fr2433]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2

      - name: Install msp430-elf-gcc
        shell: bash
        run: |
          curl -LO http://software-dl.ti.com/msp430/msp430_public_sw/mcu/msp430/MSPGCC/8_3_1_0/export/msp430-gcc-8.3.1.25_linux64.tar.bz2
          tar xjf msp430-gcc-8.3.1.25_linux64.tar.bz2
          echo "$GITHUB_WORKSPACE/msp430-gcc-8.3.1.25_linux64/bin" >> $GITHUB_PATH

      - name: Check msp430-elf-gcc
        shell: bash
        run: msp430-elf-gcc --version

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ matrix.rust_toolchain }}
          override: true
          components: rust-src

      - name: Build library
        working-directory: hal/
        run: cargo +${{matrix.rust_toolchain}} build --features ${{matrix.device}}
    
      - name: Build library with ehal02
        working-directory: hal/
        run: cargo +${{matrix.rust_toolchain}} build --features ${{matrix.device}},embedded-hal-02

      - name: Build all examples
        if: matrix.rust_toolchain == 'nightly'
        working-directory: device-examples/${{matrix.device}}
        run: cargo build --examples
      
      - name: Build MSRV examples
        if: matrix.rust_toolchain != 'nightly'
        working-directory: device-examples/${{matrix.device}}
        run: cargo build --examples --no-default-features
